name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sidecar:
    strategy:
      matrix:
        include:
          - os: macos-14       # Apple Silicon
            triple: aarch64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: pip install pillow numpy matplotlib opencv-python-headless fastapi uvicorn pyinstaller
      - name: Build sidecar
        working-directory: TauriApp/python-sidecar
        run: |
          pyinstaller --onefile --name api-server \
            --hidden-import=uvicorn.logging \
            --hidden-import=uvicorn.protocols.http \
            --hidden-import=uvicorn.protocols.http.auto \
            --hidden-import=uvicorn.protocols.websockets \
            --hidden-import=uvicorn.protocols.websockets.auto \
            --hidden-import=uvicorn.lifespan \
            --hidden-import=uvicorn.lifespan.on \
            --hidden-import=uvicorn.lifespan.off \
            --collect-all PIL --collect-all matplotlib --collect-all cv2 \
            --noconfirm api_server.py
        shell: bash
      - name: Copy sidecar binary
        run: |
          mkdir -p TauriApp/src-tauri/binaries
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp TauriApp/python-sidecar/dist/api-server.exe "TauriApp/src-tauri/binaries/api-server-${{ matrix.triple }}.exe"
          else
            cp TauriApp/python-sidecar/dist/api-server "TauriApp/src-tauri/binaries/api-server-${{ matrix.triple }}"
          fi
        shell: bash
      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: TauriApp/src-tauri/binaries/

  build-tauri:
    needs: build-sidecar
    strategy:
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: TauriApp/src-tauri/binaries/
      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x TauriApp/src-tauri/binaries/api-server-*
      - name: Install frontend deps
        working-directory: TauriApp
        run: npm ci
      - name: Build frontend
        working-directory: TauriApp
        run: npm run build
      - name: Build Tauri
        working-directory: TauriApp
        run: npx tauri build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.triple }}
          path: |
            TauriApp/src-tauri/target/release/bundle/dmg/*.dmg
            TauriApp/src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-*/**/*.dmg
            artifacts/release-*/**/*.exe
          generate_release_notes: true
