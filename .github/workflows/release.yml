name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sidecar:
    strategy:
      matrix:
        include:
          - os: macos-14       # Apple Silicon
            triple: aarch64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: pip install pillow numpy matplotlib opencv-python-headless fastapi uvicorn pyinstaller
      - name: Build sidecar
        working-directory: TauriApp/python-sidecar
        run: |
          pyinstaller --onefile --name api-server \
            --hidden-import=uvicorn.logging \
            --hidden-import=uvicorn.protocols.http \
            --hidden-import=uvicorn.protocols.http.auto \
            --hidden-import=uvicorn.protocols.websockets \
            --hidden-import=uvicorn.protocols.websockets.auto \
            --hidden-import=uvicorn.lifespan \
            --hidden-import=uvicorn.lifespan.on \
            --hidden-import=uvicorn.lifespan.off \
            --collect-all PIL --collect-all matplotlib --collect-all cv2 \
            --noconfirm api_server.py
        shell: bash
      - name: Copy sidecar binary
        run: |
          mkdir -p TauriApp/src-tauri/binaries
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp TauriApp/python-sidecar/dist/api-server.exe "TauriApp/src-tauri/binaries/api-server-${{ matrix.triple }}.exe"
          else
            cp TauriApp/python-sidecar/dist/api-server "TauriApp/src-tauri/binaries/api-server-${{ matrix.triple }}"
          fi
        shell: bash
      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: TauriApp/src-tauri/binaries/

  build-tauri:
    needs: build-sidecar
    strategy:
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: TauriApp/src-tauri/binaries/
      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x TauriApp/src-tauri/binaries/api-server-*
      - name: Install frontend deps
        working-directory: TauriApp
        run: npm ci
      - name: Build frontend
        working-directory: TauriApp
        run: npm run build
      - name: Build Tauri (with updater signing)
        working-directory: TauriApp
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build
      - name: Ad-hoc sign macOS app and rebuild DMG
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find TauriApp/src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1)
          echo "Signing $APP_PATH"
          codesign --force --deep -s - "$APP_PATH"
          codesign --verify "$APP_PATH" && echo "Signature valid"
          # Rebuild DMG with signed app + Applications symlink
          DMG_PATH=$(find TauriApp/src-tauri/target/release/bundle/dmg -name "*.dmg" -maxdepth 1)
          DMG_NAME=$(basename "$DMG_PATH")
          rm "$DMG_PATH"
          STAGE_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"
          hdiutil create -volname "Multi-Panel Figure Builder" -srcfolder "$STAGE_DIR" -ov -format UDZO "TauriApp/src-tauri/target/release/bundle/dmg/$DMG_NAME"
          rm -rf "$STAGE_DIR"
        shell: bash
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.triple }}
          path: |
            TauriApp/src-tauri/target/release/bundle/dmg/*.dmg
            TauriApp/src-tauri/target/release/bundle/nsis/*.exe
            TauriApp/src-tauri/target/release/bundle/nsis/*.exe.sig
            TauriApp/src-tauri/target/release/bundle/macos/*.app.tar.gz
            TauriApp/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  create-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: List artifacts for debugging
        run: find artifacts/ -type f | sort
      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="zhuojianlook/multipanelfigure"

          # Find signature files
          WIN_SIG=$(find artifacts/ -name "*.exe.sig" | head -1)
          MAC_SIG=$(find artifacts/ -name "*.app.tar.gz.sig" | head -1)

          # Read signatures
          WIN_SIGNATURE=""
          MAC_SIGNATURE=""
          if [ -f "$WIN_SIG" ]; then WIN_SIGNATURE=$(cat "$WIN_SIG"); fi
          if [ -f "$MAC_SIG" ]; then MAC_SIGNATURE=$(cat "$MAC_SIG"); fi

          # Find actual filenames for download URLs
          WIN_EXE=$(find artifacts/ -name "*.exe" ! -name "*.exe.sig" | head -1)
          MAC_TAR=$(find artifacts/ -name "*.app.tar.gz" ! -name "*.sig" | head -1)
          WIN_NAME=$(basename "$WIN_EXE" 2>/dev/null || echo "")
          MAC_NAME=$(basename "$MAC_TAR" 2>/dev/null || echo "")

          cat > artifacts/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Update to v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIGNATURE}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/${WIN_NAME}"
              },
              "darwin-aarch64": {
                "signature": "${MAC_SIGNATURE}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/${MAC_NAME}"
              }
            }
          }
          ENDJSON
          echo "Generated latest.json:"
          cat artifacts/latest.json
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-*/**/*.dmg
            artifacts/release-*/**/*.exe
            artifacts/release-*/**/*.app.tar.gz
            artifacts/release-*/**/*.sig
            artifacts/latest.json
          generate_release_notes: true
